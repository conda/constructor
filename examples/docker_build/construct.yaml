name: test_docker
version: 1.0.0

channels:
  - conda-forge

specs:
  - python
  - numpy
  - conda

installer_type: docker
# Generates Dockerfile and stages the installer.

docker_build: true
# Additionally builds a portable Docker image from the generated Dockerfile.

docker_base_image: "debian:13.4-slim@sha256:cedb1ef40439206b673ee8b33a46a03a0c9fa90bf3732f54704f99cb061d2c5a"

keep_pkgs: true

register_envs: true

docker_labels:
  maintainer: "jaidarice"
  description: "Test Docker image built with constructor."
